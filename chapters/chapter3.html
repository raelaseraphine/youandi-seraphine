<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Chapter III • The Little Things That Make You, You
    </title>

    <!-- Google Fonts -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="../assets/css/chapter3.css">

</head>

<body>

    <!-- ========================================= -->
    <!-- SCREEN LOADER -->
    <!-- ========================================= -->

    <div
        id="screenLoader"
        class="screen-loader">

        <div class="loader-content">

            <span class="loader-chapter">

                Chapter III

            </span>

            <h1 class="loader-title">

                The Little Things That Make You, You

            </h1>

        </div>

    </div>

    <!-- ========================================= -->
    <!-- TRANSITION OVERLAY -->
    <!-- ========================================= -->

    <div
        id="transitionOverlay"
        class="transition-overlay">

    </div>

    <!-- ========================================= -->
    <!-- CURSOR LIGHT -->
    <!-- ========================================= -->

    <div
        id="cursorLight"
        class="cursor-light">

    </div>

    <!-- ========================================= -->
    <!-- BACKGROUND -->
    <!-- ========================================= -->

    <div class="background">

        <div class="gradient"></div>

        <div class="blob blob1"></div>

        <div class="blob blob2"></div>

        <div class="sunlight"></div>

        <div class="particles"></div>

    </div>

    <!-- ========================================= -->
    <!-- HEADER -->
    <!-- ========================================= -->

    <header>

        <div class="chapter-header">

            <span>

                Chapter III

            </span>

            <small>

                The Little Things That Make You, You

            </small>

        </div>

        <div class="chapter-progress">

            03 / 06

        </div>

    </header>

    <!-- ========================================= -->
    <!-- MAIN -->
    <!-- ========================================= -->

    <main>

        <!-- ===================================== -->
        <!-- STORY -->
        <!-- ===================================== -->

        <section
            id="storySection"
            class="story-section">

            <div class="story-wrapper">

                <div class="story-content">

                    <h1 id="sentence"></h1>

                </div>

                <div class="story-indicator">

                    <span></span>

                </div>

            </div>

        </section>

        <!-- ===================================== -->
        <!-- MEMORY -->
        <!-- ===================================== -->

        <section
            id="memorySection"
            class="memory-section hidden">

            <div class="memory-card">

                <span
                    id="memoryLabel"
                    class="memory-label">

                </span>

                <h1
                    id="memoryTitle"
                    class="memory-title">

                </h1>

                <p
                    id="memoryDescription"
                    class="memory-description">

                </p>

            </div>

        </section>

        <!-- ===================================== -->
        <!-- REFLECTION -->
        <!-- ===================================== -->

        <section
            id="reflectionSection"
            class="reflection-section hidden">

            <div class="reflection-wrapper">

                <p id="reflectionText"></p>

            </div>

        </section>

        <!-- ===================================== -->
        <!-- TRANSITION -->
        <!-- ===================================== -->

        <section
            id="transitionSection"
            class="transition-section hidden">

            <div class="transition-wrapper">

                <div class="transition-line"></div>

                <p
                    class="transition-text"
                    id="transitionText">

                </p>

            </div>

        </section>

        <!-- ===================================== -->
        <!-- ENDING -->
        <!-- ===================================== -->

        <section
            id="endingSection"
            class="ending-section hidden">

            <div class="ending-wrapper">

                <span
                    id="endingSubtitle"
                    class="ending-subtitle">

                    Chapter III

                </span>

                <h1 id="endingTitle">

                </h1>

                <p
                    id="endingDescription"
                    class="ending-description">

                </p>

                <div
                    id="endingDivider"
                    class="ending-divider">

                </div>

                <button id="nextChapter">

                    Lanjut ke Chapter IV →

                </button>

            </div>

        </section>

    </main>

    <!-- ========================================= -->
    <!-- AUDIO -->
    <!-- ========================================= -->

    <audio
        id="ambientSound"
        loop>

        <source
            src="../assets/audio/ambient.mp3"
            type="audio/mpeg">

    </audio>

    <audio
        id="bgMusic"
        loop>

        <source
            src="../assets/audio/chapter3.mp3"
            type="audio/mpeg">

    </audio>

    <!-- ========================================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================================= -->

    <script
        src="../assets/js/chapter3.js">

    </script>

</body>

</html>
